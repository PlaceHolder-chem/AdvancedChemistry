# --- Предметы ---
item.advanced-chemistry-tungsten-alloy.name = Вольфрамит
item.advanced-chemistry-tungsten-alloy.description = Дибериллид вольфрама (Вольфрамит является Рудой вольфрама, но здесь он будет как простая замена сложного названия). Прочный сплав для создания высокотехнологичных конструкций

item.advanced-chemistry-sulfur.name = Сера
item.advanced-chemistry-sulfur.description = Жёлтый кристаллический элемент. Горючий, используется в химической промышленности.

item.advanced-chemistry-carbon.name = Углерод
item.advanced-chemistry-carbon.description = Твёрдый материал. Основа для создания карбона.

item.advanced-chemistry-carbone.name = Карбон
item.advanced-chemistry-carbone.description = Высокопрочный композитный материал. Применяется в передовых технологиях.

item.advanced-chemistry-salt.name = Соль
item.advanced-chemistry-salt.description = Хлорид натрия. Используется в электролизере для получения хлора.

item.advanced-chemistry-apatite.name = Апатиты
item.advanced-chemistry-apatite.description = Фосфатный минерал. Исходное сырьё для производства фосфора.

item.advanced-chemistry-silver.name = Серебро
item.advanced-chemistry-silver.description = Благородный металл. Катализатор в ряде химических реакций.

item.advanced-chemistry-pyrite.name = Пирит
item.advanced-chemistry-pyrite.description = Сульфид железа (FeS₂). Используется в аппарате Киппа для получения сероводорода.

item.advanced-chemistry-mineral-ore.name = Минеральная руда
item.advanced-chemistry-mineral-ore.description = Комплексная руда. Содержит множество полезных компонентов. Перерабатывается в расщепителе минералов.

# --- Жидкости ---
liquid.advanced-chemistry-oxygen.name = Кислород
liquid.advanced-chemistry-oxygen.description = Жизненно необходимый газ. Окислитель.

liquid.advanced-chemistry-rocket-fuel.name = Ракетное Топливо
liquid.advanced-chemistry-rocket-fuel.description = Высокоэнергетическая смесь. Взрывоопасна!

liquid.advanced-chemistry-sulfur-dioxide.name = Оксид серы (SO₂)
liquid.advanced-chemistry-sulfur-dioxide.description = Бесцветный газ с резким запахом. Промежуточный продукт для получения серы и серной кислоты.

liquid.advanced-chemistry-methane.name = Метан (CH₄)
liquid.advanced-chemistry-methane.description = Горючий газ. Основное сырьё для получения углерода и водорода.

liquid.advanced-chemistry-hydrogen-peroxide.name = Перекись водорода (H₂O₂)
liquid.advanced-chemistry-hydrogen-peroxide.description = Мощный окислитель. Используется в производстве серной кислоты.

liquid.advanced-chemistry-sulfuric-acid.name = Серная кислота (H₂SO₄)
liquid.advanced-chemistry-sulfuric-acid.description = Сильная кислота. Применяется во многих химических процессах.

liquid.advanced-chemistry-hydrochloric-acid.name = Соляная кислота (HCl)
liquid.advanced-chemistry-hydrochloric-acid.description = Хлороводородная кислота. Необходима в аппарате Киппа для получения сероводорода.

# --- Блоки ---
block.advanced-chemistry-sintering-furnace.name = Спекательная Печь
block.advanced-chemistry-sintering-furnace.description = Сплавляет вольфрам с бериллием для получения дибериллида вольфрама. (Вольфрамита) (WBe2)

block.advanced-chemistry-ozone-destructor.name = Деструктор Озона
block.advanced-chemistry-ozone-destructor.description = Разлагает озон на кислород с помощью кремниевого катализатора.

block.advanced-chemistry-fuel-mixer.name = Смеситель Топлива
block.advanced-chemistry-fuel-mixer.description = Смешивает кислород и водород для получения ракетного топлива.

# --- Блоки (Энергетика) ---
block.advanced-chemistry-rocket-fuel-reactor.name = Реактор на Ракетном Топливе
block.advanced-chemistry-rocket-fuel-reactor.description = Преобразует ракетное топливо в энергию. Так же образует воду как побочный продукт.

# --- Стены ---
block.advanced-chemistry-tungsten-alloy-wall.name = Вольфрамитовая Стена
block.advanced-chemistry-tungsten-alloy-wall.description = Чрезвычайно прочная стена. При разрушении выпускает острые осколки.

block.advanced-chemistry-tungsten-alloy-wall-large.name = Большая Вольфрамитовая
block.advanced-chemistry-tungsten-alloy-wall-large.description = Огромная прочная стена. При разрушении наносит огромный урон осколками.

# Новые предметы
item.advanced-chemistry-aluminum-oxide.name = Оксид алюминия
item.advanced-chemistry-aluminum-oxide.description = Белый порошок. Исходное сырьё для производства алюминия.

item.advanced-chemistry-lead-oxide.name = Оксид свинца
item.advanced-chemistry-lead-oxide.description = Феолетовый порошок (В реальности является желтоватым). Компонент для сплавов.

item.advanced-chemistry-zinc-chloride.name = Хлорид цинка
item.advanced-chemistry-zinc-chloride.description = Белое кристаллическое вещество. Используется в гальванике.

item.advanced-chemistry-lithium-fluoride.name = Фторид лития
item.advanced-chemistry-lithium-fluoride.description = Белая соль. Применяется в ядерной энергетике и оптике.

item.advanced-chemistry-iron-chloride.name = Хлорид железа
item.advanced-chemistry-iron-chloride.description = Тёмно-коричневое вещество. Компонент некоторых снарядов.

item.advanced-chemistry-white-phosphorus.name = Белый фосфор
item.advanced-chemistry-white-phosphorus.description = Чрезвычайно горючее и токсичное вещество. Самовоспламеняется на воздухе.

# Новые жидкости/газы
liquid.advanced-chemistry-chlorine.name = Хлор
liquid.advanced-chemistry-chlorine.description = Жёлто-зелёный газ. Токсичен. Используется в производстве соляной кислоты.

liquid.advanced-chemistry-hydrogen-sulfide.name = Сероводород
liquid.advanced-chemistry-hydrogen-sulfide.description = Газ с запахом тухлых яиц. Ядовит и горюч.

liquid.advanced-chemistry-sodium-hydroxide.name = Гидроксид натрия
liquid.advanced-chemistry-sodium-hydroxide.description = Едкая щелочь. Побочный продукт электролиза соли.

block.advanced-chemistry-mineral-disassembler.name = Расщепитель минералов
block.advanced-chemistry-mineral-disassembler.description = Перерабатывает минеральную руду в набор полезных компонентов. Некоторые ресурсы выпадают чаще других.

block.advanced-chemistry-atmospheric-centrifuge.name = Атмосферная центрифуга
block.advanced-chemistry-atmospheric-centrifuge.description = Извлекает из атмосферы Эрекира оксид серы и метан.

block.advanced-chemistry-methane-pyrolyzer.name = Пиролизатор метана
block.advanced-chemistry-methane-pyrolyzer.description = Разлагает метан на углерод и водород при высокой температуре.

block.advanced-chemistry-sulfur-reducer.name = Восстановитель серы
block.advanced-chemistry-sulfur-reducer.description = Превращает оксид серы и метан в чистую серу. Побочные продукты — вода и углекислый газ.

block.advanced-chemistry-vacuum-infusor.name = Вакуумный инфузор
block.advanced-chemistry-vacuum-infusor.description = Создаёт карбон — высокопрочный композитный материал. Требует углерод и акрицит в качестве связующего.

block.advanced-chemistry-phosphorus-furnace.name = Фосфорная электропечь
block.advanced-chemistry-phosphorus-furnace.description = Производит белый фосфор из апатитов, песка и кремния при очень высоких температурах.

block.advanced-chemistry-hcl-synthesizer.name = Синтезатор хлороводорода
block.advanced-chemistry-hcl-synthesizer.description = Синтезирует соляную кислоту из водорода, хлора и воды.

block.advanced-chemistry-kipp-apparatus.name = Аппарат Киппа
block.advanced-chemistry-kipp-apparatus.description = Производит сероводород из пирита и соляной кислоты. Побочный продукт — хлорид железа.

block.advanced-chemistry-peroxide-lab.name = Пероксидная лаборатория
block.advanced-chemistry-peroxide-lab.description = Производит серную кислоту из оксида серы и перекиси водорода.

block.advanced-chemistry-fuel-catalyst.name = Катализатор топлива
block.advanced-chemistry-fuel-catalyst.description = Превращает ракетное топливо в перекись водорода с использованием серебряного катализатора. Серебро расходуется.

item.advanced-chemistry-mineral.name = Минерал
item.advanced-chemistry-mineral.description = Минерал содержит множество разных элементов и полезных ископаемых.

block.advanced-chemistry-salt-electrolyzer.name = Электролизатор соли
block.advanced-chemistry-salt-electrolyzer.description = Соль проходящая через процесс электроиза распадается на Хлор и Гидроксид Натрия