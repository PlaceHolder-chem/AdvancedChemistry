# --- Items ---
item.advanced-chemistry-tungsten-alloy.name = Wolframite
item.advanced-chemistry-tungsten-alloy.description = Tungsten beryllide (Wolframite is actually a tungsten ore, but here it serves as a simpler, alternative name for this complex alloy). A durable alloy used in the creation of high-tech structures.

# --- Liquids ---
liquid.advanced-chemistry-oxygen.name = Oxygen
liquid.advanced-chemistry-oxygen.description = Life-sustaining gas. Oxidizer.

liquid.advanced-chemistry-rocket-fuel.name = Rocket Fuel
liquid.advanced-chemistry-rocket-fuel.description = High-energy mixture. Explosive!

# --- Blocks ---
block.advanced-chemistry-sintering-furnace.name = Sintering Furnace
block.advanced-chemistry-sintering-furnace.description = Combines tungsten with beryllium to produce tungsten beryllide. (Wolframite) (WBe2)

block.advanced-chemistry-ozone-destructor.name = Ozone Destructor
block.advanced-chemistry-ozone-destructor.description = Breaks down ozone into oxygen using a silicon catalyst.

block.advanced-chemistry-fuel-mixer.name = Fuel Mixer
block.advanced-chemistry-fuel-mixer.description = Mixes oxygen and hydrogen to produce rocket fuel.

# --- Blocks (Energy) ---
block.advanced-chemistry-rocket-fuel-reactor.name = Rocket Fuel Reactor
block.advanced-chemistry-rocket-fuel-reactor.description = Converts rocket fuel into energy. Water is a byproduct.

# --- Walls ---
block.advanced-chemistry-tungsten-alloy-wall.name = Wolframite Wall
block.advanced-chemistry-tungsten-alloy-wall.description = Extremely durable wall. Releases sharp shrapnel when destroyed.

block.advanced-chemistry-tungsten-alloy-wall-large.name = Large Wolframite Wall
block.advanced-chemistry-tungsten-alloy-wall-large.description = Massive durable wall. Deals massive shrapnel damage when destroyed.

# ------------------- ITEMS -------------------
item.advanced-chemistry-sulfur.name = Sulfur
item.advanced-chemistry-sulfur.description = Yellow crystalline element. Flammable, used in chemical industry.

item.advanced-chemistry-carbon.name = Carbon
item.advanced-chemistry-carbon.description = Solid material. Base for producing Carbone.

item.advanced-chemistry-carbone.name = Carbon fiber
item.advanced-chemistry-carbone.description = High-strength composite material. Used in advanced technologies.

item.advanced-chemistry-salt.name = Salt
item.advanced-chemistry-salt.description = Sodium chloride. Used in electrolyzer to produce chlorine.

item.advanced-chemistry-apatite.name = Apatite
item.advanced-chemistry-apatite.description = Phosphate mineral. Raw material for phosphorus production.

item.advanced-chemistry-silver.name = Silver
item.advanced-chemistry-silver.description = Noble metal. Catalyst in various chemical reactions.

item.advanced-chemistry-pyrite.name = Pyrite
item.advanced-chemistry-pyrite.description = Iron sulfide (FeS₂). Used in Kipp apparatus to produce hydrogen sulfide.

item.advanced-chemistry-mineral-ore.name = Mineral Ore
item.advanced-chemistry-mineral-ore.description = Complex ore. Contains many useful components. Processed in mineral disassembler.

# ------------------- LIQUIDS & GASES -------------------
liquid.advanced-chemistry-sulfur-dioxide.name = Sulfur Dioxide (SO₂)
liquid.advanced-chemistry-sulfur-dioxide.description = Colorless gas with a pungent odor. Intermediate product for sulfur and sulfuric acid.

liquid.advanced-chemistry-methane.name = Methane (CH₄)
liquid.advanced-chemistry-methane.description = Flammable gas. Main raw material for producing carbon and hydrogen.

liquid.advanced-chemistry-hydrogen-peroxide.name = Hydrogen Peroxide (H₂O₂)
liquid.advanced-chemistry-hydrogen-peroxide.description = Powerful oxidizer. Used in the production of sulfuric acid.

liquid.advanced-chemistry-sulfuric-acid.name = Sulfuric Acid (H₂SO₄)
liquid.advanced-chemistry-sulfuric-acid.description = Strong acid. Used in many chemical processes.

liquid.advanced-chemistry-hydrochloric-acid.name = Hydrochloric Acid (HCl)
liquid.advanced-chemistry-hydrochloric-acid.description = Hydrogen chloride acid. Required in the Kipp apparatus for hydrogen sulfide production.

# New items
item.advanced-chemistry-aluminum-oxide.name = Aluminum Oxide
item.advanced-chemistry-aluminum-oxide.description = White powder. Raw material for aluminum production.

item.advanced-chemistry-lead-oxide.name = Lead Oxide
item.advanced-chemistry-lead-oxide.description = Violet powder (although it is yellowish in reality). Component for alloys.

item.advanced-chemistry-zinc-chloride.name = Zinc Chloride
item.advanced-chemistry-zinc-chloride.description = White crystalline substance. Used in electroplating.

item.advanced-chemistry-lithium-fluoride.name = Lithium Fluoride
item.advanced-chemistry-lithium-fluoride.description = White salt. Used in nuclear energy and optics.

item.advanced-chemistry-iron-chloride.name = Iron Chloride
item.advanced-chemistry-iron-chloride.description = Dark brown substance. Component for some ammunition.

item.advanced-chemistry-white-phosphorus.name = White Phosphorus
item.advanced-chemistry-white-phosphorus.description = Extremely flammable and toxic. Ignites spontaneously in air.

# New liquids/gases
liquid.advanced-chemistry-chlorine.name = Chlorine
liquid.advanced-chemistry-chlorine.description = Yellow-green gas. Toxic. Used in hydrochloric acid production.

liquid.advanced-chemistry-hydrogen-sulfide.name = Hydrogen Sulfide
liquid.advanced-chemistry-hydrogen-sulfide.description = Gas with a rotten egg smell. Poisonous and flammable.

liquid.advanced-chemistry-sodium-hydroxide.name = Sodium Hydroxide
liquid.advanced-chemistry-sodium-hydroxide.description = Caustic alkali. Byproduct of salt electrolysis.

block.advanced-chemistry-mineral-disassembler.name = Mineral Disassembler
block.advanced-chemistry-mineral-disassembler.description = Processes mineral ore into a set of useful components. Some resources drop more often than others.

block.advanced-chemistry-atmospheric-centrifuge.name = Atmospheric Centrifuge
block.advanced-chemistry-atmospheric-centrifuge.description = Extracts sulfur dioxide and methane from Erekir's atmosphere.

block.advanced-chemistry-methane-pyrolyzer.name = Methane Pyrolyzer
block.advanced-chemistry-methane-pyrolyzer.description = Decomposes methane into carbon and hydrogen at high temperature.

block.advanced-chemistry-sulfur-reducer.name = Sulfur Reducer
block.advanced-chemistry-sulfur-reducer.description = Converts sulfur dioxide and methane into pure sulfur. Byproducts include water and carbon dioxide.

block.advanced-chemistry-vacuum-infusor.name = Vacuum Infusor
block.advanced-chemistry-vacuum-infusor.description = Creates Carbon fiber, a high-strength composite material. Requires carbon and acricite as a binder.

block.advanced-chemistry-phosphorus-furnace.name = Phosphorus Electric Furnace
block.advanced-chemistry-phosphorus-furnace.description = Produces white phosphorus from apatite, sand and silicon at extremely high temperatures.

block.advanced-chemistry-hcl-synthesizer.name = Hydrogen Chloride Synthesizer
block.advanced-chemistry-hcl-synthesizer.description = Synthesizes hydrochloric acid from hydrogen, chlorine and water.

block.advanced-chemistry-kipp-apparatus.name = Kipp Apparatus
block.advanced-chemistry-kipp-apparatus.description = Produces hydrogen sulfide from pyrite and hydrochloric acid. Byproduct is iron chloride.

block.advanced-chemistry-peroxide-lab.name = Peroxide Laboratory
block.advanced-chemistry-peroxide-lab.description = Produces sulfuric acid from sulfur dioxide and hydrogen peroxide.

block.advanced-chemistry-fuel-catalyst.name = Fuel Catalyst
block.advanced-chemistry-fuel-catalyst.description = Converts rocket fuel into hydrogen peroxide using a silver catalyst. Silver is consumed.

item.advanced-chemistry-mineral.name = Mineral
item.advanced-chemistry-mineral.description = Contains many different elements and useful minerals.

block.advanced-chemistry-salt-electrolyzer.name = Salt Electrolyzer
block.advanced-chemistry-salt-electrolyzer.description = Salt undergoing electrolysis breaks down into Chlorine and Sodium Hydroxide.